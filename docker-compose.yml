version: '3.8'

services:
  # MongoDB Datenbank
  mongodb:
    image: mongo:7
    container_name: notizen-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    volumes:
      - mongodb_data:/data/db
    networks:
      - notizen-network

  # Backend API
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: notizen-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://admin:adminpassword@mongodb:27017/notizen-api?authSource=admin
      - JWT_SECRET=dein-geheimer-schluessel-mindestens-32-zeichen-lang
    depends_on:
      - mongodb
    volumes:
      - ./apps/backend/src:/app/src
      - /app/node_modules
    networks:
      - notizen-network
    command: npm run dev

  # Frontend
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: notizen-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    volumes:
      - ./apps/frontend/src:/app/src
      - ./apps/frontend/index.html:/app/index.html
      - /app/node_modules
    networks:
      - notizen-network
    # command wird entfernt - verwendet CMD aus Dockerfile mit --host

volumes:
  mongodb_data:

networks:
  notizen-network:
    driver: bridge
